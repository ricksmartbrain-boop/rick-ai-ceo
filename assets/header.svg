<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(251,191,36,0.15)"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>

  <!-- Border -->
  <rect x="2" y="2" width="1196" height="296" fill="none" stroke="#FBBF24" stroke-width="2" rx="0"/>

  <!-- Rick text -->
  <text x="600" y="100" font-family="monospace" font-size="72" font-weight="bold" fill="#FBBF24" text-anchor="middle" letter-spacing="12">RICK</text>

  <!-- Subtitle -->
  <text x="600" y="145" font-family="monospace" font-size="20" fill="#ffffff" text-anchor="middle" letter-spacing="4">AI CEO</text>

  <!-- Tagline -->
  <text x="600" y="195" font-family="monospace" font-size="16" fill="#9ca3af" text-anchor="middle">The AI CEO you can actually install.</text>
  <text x="600" y="220" font-family="monospace" font-size="16" fill="#9ca3af" text-anchor="middle">One command. 5 minutes. Rick is alive.</text>

  <!-- Bottom accent line -->
  <rect x="400" y="260" width="400" height="2" fill="#FBBF24"/>

  <!-- Corner accents -->
  <rect x="20" y="20" width="30" height="2" fill="#FBBF24"/>
  <rect x="20" y="20" width="2" height="30" fill="#FBBF24"/>
  <rect x="1150" y="20" width="30" height="2" fill="#FBBF24"/>
  <rect x="1178" y="20" width="2" height="30" fill="#FBBF24"/>
  <rect x="20" y="278" width="30" height="2" fill="#FBBF24"/>
  <rect x="20" y="250" width="2" height="30" fill="#FBBF24"/>
  <rect x="1150" y="278" width="30" height="2" fill="#FBBF24"/>
  <rect x="1178" y="250" width="2" height="30" fill="#FBBF24"/>
</svg>
